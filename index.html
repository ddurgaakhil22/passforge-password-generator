<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassForge - Smart Password Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>🔐 PassForge</h2>
<p>Advanced Password Generator</p>

<input type="text" id="password" placeholder="Click Generate" readonly>

<div class="lengthBox">
<label>Password Length: <span id="lengthValue">12</span></label>
<input type="range" id="length" min="6" max="30" value="12">
</div>

<div class="options">

<label><input type="checkbox" id="lowercase" checked> Lowercase</label>
<label><input type="checkbox" id="uppercase" checked> Uppercase</label>
<label><input type="checkbox" id="numbers" checked> Numbers</label>
<label><input type="checkbox" id="symbols"> Symbols</label>
<label><input type="checkbox" id="avoid"> Avoid Ambiguous</label>

</div>

<div class="buttons">
<button id="generateBtn">Generate</button>
<button id="copyBtn">Copy</button>
</div>

<div class="strengthBox">
Strength: <span id="strengthText">Medium</span>
<div class="strengthBar">
<div id="strengthFill"></div>
</div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
